<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useRef, useEffect, useCallback, useMemo } = React;

/* ── lucide icons (from window.lucide UMD) ── */
function Icon({ name, size = 20 }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = "";
      const svg = window.lucide.createElement(name);
      if (svg) {
        svg.setAttribute("width", size);
        svg.setAttribute("height", size);
        svg.setAttribute("stroke", "currentColor");
        svg.setAttribute("stroke-width", "2");
        svg.setAttribute("stroke-linecap", "round");
        svg.setAttribute("stroke-linejoin", "round");
        svg.setAttribute("fill", "none");
        ref.current.appendChild(svg);
      }
    }
  }, [name, size]);
  return React.createElement("span", { ref, style: { display:"inline-flex", alignItems:"center" } });
}

/* ── 상수 ── */
const DEFAULTS = { focus: 20, review: 5, brk: 15, sessions: 3, autoNext: true, sound: true };

const PHASES = {
  focus:  { label:"집중", top:"#4E6EF2", deep:"#1B2B85", glow:"rgba(78,110,242,0.45)" },
  review: { label:"복기", top:"#DE8E2C", deep:"#7C400E", glow:"rgba(222,142,44,0.42)" },
  brk:    { label:"휴식", top:"#2CA87E", deep:"#0C513B", glow:"rgba(44,168,126,0.42)" },
};

const durMs  = (phase, s) => (phase==="focus" ? s.focus : phase==="review" ? s.review : s.brk) * 60000;
const fmt    = ms => { const t=Math.max(0,Math.round(ms/1000)); const m=Math.floor(t/60); const sc=t%60; return `${String(m).padStart(2,"0")}:${String(sc).padStart(2,"0")}`; };
const hexA   = (hex, a) => { const n=parseInt(hex.slice(1),16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; };

const WAVE_D = (() => {
  let d = "M0 16 Q 50 5 100 16";
  for (let x=200; x<=2400; x+=100) d += ` T ${x} 16`;
  return d + " L2400 32 L0 32 Z";
})();

/* ── CSS ── */
const CSS = `

.tide-textbtn{border:1px solid rgba(242,239,230,.18);background:transparent;color:#C9CDD9;border-radius:12px;padding:11px 16px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer}
.tide-textbtn.primary{background:#F2EFE6;color:#0B0E14;border-color:#F2EFE6;font-weight:700}
.tide-textbtn:focus-visible{outline:2px solid #F2EFE6;outline-offset:3px}
@media (max-width:460px){.tide-stripmeta span:first-child{display:none}.tide-stripmeta{justify-content:flex-end}}

/* ── Stepper ── */
function Stepper({ value, min, max, suffix, onChange }) {
  const cb = useRef(null); const timer = useRef(null); const iv = useRef(null);
  const stop = () => { clearTimeout(timer.current); clearInterval(iv.current); };
  const begin = (delta) => {
    cb.current = () => onChange(v => Math.min(max, Math.max(min, v + delta)));
    cb.current();
    timer.current = setTimeout(() => { iv.current = setInterval(() => cb.current(), 70); }, 380);
  };
  useEffect(() => stop, []);
  const btn = (delta, iconName, label) => (
    <button type="button" className="tide-btn sm" aria-label={label}
      onPointerDown={() => begin(delta)}
      onPointerUp={stop} onPointerLeave={stop} onPointerCancel={stop}
      onClick={e => { if (e.detail===0) onChange(v => Math.min(max, Math.max(min, v+delta))); }}>
      <Icon name={delta < 0 ? "minus" : "plus"} size={18} />
    </button>
  );
  return (
    <div className="tide-step">
      {btn(-1, "minus", "줄이기")}
      <span className="val">{value}<small>{suffix}</small></span>
      {btn(+1, "plus", "늘리기")}
    </div>
  );
}

function Toggle({ on, onChange, label }) {
  return (
    <button type="button" role="switch" aria-checked={on} aria-label={label}
      className={`tide-switch ${on?"on":""}`}
      style={{ background: on ? "#4E6EF2" : "rgba(242,239,230,.16)" }}
      onClick={() => onChange(!on)}>
      <span className="knob" />
    </button>
  );
}

/* ── 메인 ── */
function App() {
  const [settings, setSettings] = useState(DEFAULTS);
  const [tm, setTm] = useState(() => ({ phase:"focus", sessionNo:1, status:"idle", total:DEFAULTS.focus*60000, remain:DEFAULTS.focus*60000 }));
  const [open, setOpen] = useState(false);
  const [pulse, setPulse] = useState(null);

  const endRef = useRef(0);
  const tmRef = useRef(tm);     useEffect(() => { tmRef.current = tm; }, [tm]);
  const setRef = useRef(settings); useEffect(() => { setRef.current = settings; }, [settings]);
  const openRef = useRef(open); useEffect(() => { openRef.current = open; }, [open]);
  const acRef = useRef(null);
  const wakeRef = useRef(null);

  /* 사운드 */
  const initAudio = () => {
    try {
      if (!acRef.current) acRef.current = new (window.AudioContext || window.webkitAudioContext)();
      if (acRef.current.state === "suspended") acRef.current.resume();
    } catch(e){}
  };
  const tone = (f, t0, dur, vol=0.1) => {
    const ac = acRef.current; if (!ac) return;
    try {
      const o = ac.createOscillator(); const g = ac.createGain();
      o.type="sine"; o.frequency.value=f; o.connect(g); g.connect(ac.destination);
      const t = ac.currentTime + t0;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(vol, t+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
      o.start(t); o.stop(t+dur+0.05);
    } catch(e){}
  };
  const chime = (next) => {
    if (!setRef.current.sound) return; initAudio();
    if (next==="brk") { tone(523,0,0.5); tone(392,0.18,0.7); }
    else if (next==="review") { tone(660,0,0.35); tone(880,0.16,0.5); }
    else { tone(587,0,0.3); tone(740,0.14,0.45); }
  };

  /* Wake Lock */
  useEffect(() => {
    const acquire = async () => { try { if (tm.status==="running" && navigator.wakeLock) wakeRef.current = await navigator.wakeLock.request("screen"); } catch(e){} };
    const release = () => { try { wakeRef.current?.release(); } catch(e){} wakeRef.current=null; };
    if (tm.status==="running") acquire(); else release();
    const onVis = () => { if (document.visibilityState==="visible" && tmRef.current.status==="running") acquire(); };
    document.addEventListener("visibilitychange", onVis);
    return () => { document.removeEventListener("visibilitychange", onVis); release(); };
  }, [tm.status]);

  /* 단계 전환 */
  const advance = useCallback((withSound, autostart) => {
    const p = tmRef.current; const s = setRef.current;
    let phase, sess;
    if (p.phase==="focus") { phase="review"; sess=p.sessionNo; }
    else if (p.phase==="review") {
      if (p.sessionNo >= s.sessions) { phase="brk"; sess=p.sessionNo; }
      else { phase="focus"; sess=p.sessionNo+1; }
    } else { phase="focus"; sess=1; }
    const total = durMs(phase, s);
    if (withSound) chime(phase);
    setPulse({ key:Date.now(), color:PHASES[phase].glow });
    if (autostart) { endRef.current = Date.now()+total; setTm({ phase, sessionNo:sess, status:"running", total, remain:total }); }
    else setTm({ phase, sessionNo:sess, status:"idle", total, remain:total });
  }, []);

  /* 틱 */
  useEffect(() => {
    if (tm.status !== "running") return;
    const id = setInterval(() => {
      const r = endRef.current - Date.now();
      if (r <= 0) advance(true, setRef.current.autoNext);
      else setTm(p => ({ ...p, remain:r }));
    }, 250);
    return () => clearInterval(id);
  }, [tm.status, tm.phase, tm.sessionNo, advance]);

  /* 조작 */
  const toggle = useCallback(() => {
    const p = tmRef.current;
    if (p.status==="running") { const r=Math.max(0,endRef.current-Date.now()); setTm({...p,status:"paused",remain:r}); }
    else { initAudio(); endRef.current=Date.now()+p.remain; setTm({...p,status:"running"}); }
  }, []);
  const reset = useCallback(() => { const t=durMs("focus",setRef.current); setTm({phase:"focus",sessionNo:1,status:"idle",total:t,remain:t}); }, []);
  const skip  = useCallback(() => advance(false, tmRef.current.status==="running"), [advance]);

  /* 설정 */
  const applySettings = useCallback((updater) => {
    setSettings(prev => {
      const next = typeof updater==="function" ? updater(prev) : {...prev,...updater};
      const p = tmRef.current; const patch = {};
      if (p.status==="idle" && p.remain===p.total) { const t=durMs(p.phase,next); patch.total=t; patch.remain=t; }
      if (p.sessionNo > next.sessions) patch.sessionNo=next.sessions;
      if (Object.keys(patch).length) setTm(q => ({...q,...patch}));
      return next;
    });
  }, []);

  /* localStorage 저장 */
  useEffect(() => {
    try { const s=localStorage.getItem("tide-settings"); if(s) applySettings(prev=>({...prev,...JSON.parse(s)})); } catch(e){}
  }, []);
  useEffect(() => {
    try { localStorage.setItem("tide-settings", JSON.stringify(settings)); } catch(e){}
  }, [settings]);

  /* Space 키 */
  useEffect(() => {
    const onKey = e => {
      if (e.code!=="Space"||openRef.current) return;
      if (e.target&&(e.target.tagName==="BUTTON"||e.target.closest?.("button"))) return;
      e.preventDefault(); toggle();
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [toggle]);

  /* 파생값 */
  const P = PHASES[tm.phase];
  const progress = Math.min(1, Math.max(0, 1 - tm.remain/tm.total));
  const segments = useMemo(() => {
    const a=[];
    for (let i=0;i<settings.sessions;i++) { a.push({t:"focus",d:settings.focus}); a.push({t:"review",d:settings.review}); }
    a.push({t:"brk",d:settings.brk});
    return a;
  }, [settings]);
  const curSeg = tm.phase==="brk" ? segments.length-1 : (tm.sessionNo-1)*2+(tm.phase==="review"?1:0);
  const cycleTotalMin = settings.sessions*(settings.focus+settings.review)+settings.brk;
  const elapsedMin = useMemo(() => {
    let m=0; for(let i=0;i<curSeg;i++) m+=segments[i].d;
    return m+((tm.total-tm.remain)/60000);
  }, [segments,curSeg,tm.total,tm.remain]);
  const nextInfo = useMemo(() => {
    const s=settings;
    if (tm.phase==="focus") return `복기 ${s.review}분`;
    if (tm.phase==="review") return tm.sessionNo>=s.sessions ? `휴식 ${s.brk}분` : `${tm.sessionNo+1}번째 집중 ${s.focus}분`;
    return `새 사이클 · 집중 ${s.focus}분`;
  }, [tm.phase, tm.sessionNo, settings]);

  const timeStr = fmt(tm.remain);
  const running = tm.status==="running";

  return (
    <div className="tide-app">
      <style dangerouslySetInnerHTML={{__html:CSS}} />

      {/* 차오르는 물 */}
      <div className="tide" aria-hidden="true"
        style={{ height:`${progress*100}%`, background:`linear-gradient(to top,${P.deep},${P.top})`, boxShadow:`0 -18px 70px ${P.glow}` }}>
        <div className="tide-wavewrap">
          <svg className="tide-wavesvg" viewBox="0 0 2400 32" preserveAspectRatio="none">
            <path d={WAVE_D} fill={P.top} />
          </svg>
        </div>
        <div className="tide-surface" />
      </div>

      {pulse && <div key={pulse.key} className="tide-pulse" style={{background:pulse.color}} aria-hidden="true" />}

      {/* 상단 */}
      <header className="tide-top">
        <div className="tide-mark">
          <b>STUDY\u00A0TIDE</b>
          <span>20·5·15 집중 사이클</span>
        </div>
        <div className="tide-icons">
          <button type="button" className="tide-btn sm"
            aria-label={settings.sound?"종료음 끄기":"종료음 켜기"}
            onClick={() => applySettings(s=>({...s,sound:!s.sound}))}>
            <Icon name={settings.sound?"volume-2":"volume-x"} size={19} />
          </button>
          <button type="button" className="tide-btn sm" aria-label="시간 설정" onClick={() => setOpen(true)}>
            <Icon name="settings" size={19} />
          </button>
        </div>
      </header>

      {/* 가운데 */}
      <main className="tide-main">
        <div className="tide-eyebrow">
          <span className="tide-dot" style={{background:P.top,boxShadow:`0 0 10px ${P.glow}`}} />
          <span className="tide-phase">{P.label}</span>
          <span style={{opacity:0.4}}>·</span>
          <span>{tm.phase==="brk"?"긴 휴식":`세션 ${tm.sessionNo} / ${settings.sessions}`}</span>
        </div>
        <div className="tide-clock" role="timer" aria-label={`${P.label} 남은 시간 ${timeStr}`}>
          {timeStr.split("").map((ch,i) => ch===":" ? <span key={i} className="cl">:</span> : <span key={i} className="dg">{ch}</span>)}
        </div>
        <div className="tide-next">
          {tm.status==="paused" && <span className="tide-chip">일시정지</span>}
          <span>다음 · {nextInfo}</span>
        </div>
      </main>

      {/* 하단 */}
      <footer className="tide-bottom">
        <div className="tide-strip" role="img" aria-label={`전체 사이클 ${Math.round((elapsedMin/cycleTotalMin)*100)}% 진행`}>
          {segments.map((sg,i) => {
            const c=PHASES[sg.t]; const w=i<curSeg?100:i===curSeg?progress*100:0;
            return (
              <div key={i} className="tide-seg" style={{flexGrow:sg.d,flexBasis:0,background:hexA(c.top,0.16)}}>
                <div className="tide-segfill" style={{width:`${w}%`,background:c.top}} />
              </div>
            );
          })}
        </div>
        <div className="tide-stripmeta">
          <span>집중 {settings.focus}분 + 복기 {settings.review}분 × {settings.sessions} → 휴식 {settings.brk}분</span>
          <span>{Math.floor(elapsedMin)} / {cycleTotalMin}분</span>
        </div>
        <div className="tide-controls">
          <button type="button" className="tide-btn md" aria-label="처음으로" onClick={reset}>
            <Icon name="rotate-ccw" size={21} />
          </button>
          <button type="button" className="tide-btn big" aria-label={running?"일시정지":"시작"} onClick={toggle}
            style={{boxShadow:`0 8px 36px ${P.glow}`}}>
            {running ? <Icon name="pause" size={32} /> : <Icon name="play" size={32} />}
          </button>
          <button type="button" className="tide-btn md" aria-label="다음 단계" onClick={skip}>
            <Icon name="skip-forward" size={21} />
          </button>
        </div>
      </footer>

      {/* 설정 시트 */}
      {open && (
        <>
          <div className="tide-scrim" onClick={() => setOpen(false)} />
          <div className="tide-sheet" role="dialog" aria-modal="true" aria-label="시간 설정">
            <h2>
              시간 설정
              <button type="button" className="tide-btn sm" aria-label="닫기" onClick={() => setOpen(false)}>
                <Icon name="x" size={18} />
              </button>
            </h2>
            <p className="hint">{tm.status==="running"||tm.remain!==tm.total ? "변경한 시간은 다음 단계부터 적용돼요." : "변경 즉시 적용돼요."}</p>
            <div className="tide-row" style={{borderTop:"none"}}>
              <span className="lbl">집중<span className="sub">한 세션의 공부 시간</span></span>
              <Stepper value={settings.focus} min={1} max={120} suffix="분" onChange={f => applySettings(s=>({...s,focus:f(s.focus)}))} />
            </div>
            <div className="tide-row">
              <span className="lbl">복기<span className="sub">집중 직후 정리 시간</span></span>
              <Stepper value={settings.review} min={1} max={60} suffix="분" onChange={f => applySettings(s=>({...s,review:f(s.review)}))} />
            </div>
            <div className="tide-row">
              <span className="lbl">휴식<span className="sub">사이클 끝의 긴 휴식</span></span>
              <Stepper value={settings.brk} min={1} max={60} suffix="분" onChange={f => applySettings(s=>({...s,brk:f(s.brk)}))} />
            </div>
            <div className="tide-row">
              <span className="lbl">세션 수<span className="sub">휴식 전 반복 횟수</span></span>
              <Stepper value={settings.sessions} min={1} max={8} suffix="회" onChange={f => applySettings(s=>({...s,sessions:f(s.sessions)}))} />
            </div>
            <div className="tide-row">
              <span className="lbl">자동 진행<span className="sub">단계가 끝나면 바로 다음 시작</span></span>
              <Toggle on={settings.autoNext} label="자동 진행" onChange={v => applySettings(s=>({...s,autoNext:v}))} />
            </div>
            <div className="tide-row">
              <span className="lbl">종료음<span className="sub">단계가 바뀔 때 알림음</span></span>
              <Toggle on={settings.sound} label="종료음" onChange={v => applySettings(s=>({...s,sound:v}))} />
            </div>
            <div className="tide-sheet-foot">
              <button type="button" className="tide-textbtn" onClick={() => applySettings(() => ({...DEFAULTS}))}>기본값 (20·5·15)</button>
              <button type="button" className="tide-textbtn primary" onClick={() => setOpen(false)}>완료</button>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }
</script>
</body>
</html>
