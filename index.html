<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0B0E14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Study Tide" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="description" content="집중 20분 · 복기 5분 · 휴식 15분 공부 사이클 타이머" />
  <title>Study Tide</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="icon-152.png" />
  <link rel="apple-touch-icon" sizes="120x120" href="icon-120.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,800&family=IBM+Plex+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;width:100%;height:100%;background:#0B0E14;overflow:hidden}
body{
  position:relative;width:100%;height:100vh;height:100dvh;
  overflow:hidden;display:flex;flex-direction:column;
  background:radial-gradient(120% 90% at 50% 0%,#11151F 0%,#0B0E14 62%);
  color:#F2EFE6;
  font-family:'IBM Plex Sans KR','Apple SD Gothic Neo',system-ui,sans-serif;
  touch-action:manipulation;user-select:none;-webkit-user-select:none;
}
/* 물 */
#tide{position:absolute;left:0;right:0;bottom:0;z-index:0;transition:height .55s linear;will-change:height}
#tide-surface{position:absolute;top:-1px;left:0;right:0;height:2px;background:rgba(242,239,230,.65)}
#tide-wavewrap{position:absolute;left:0;right:0;top:0;height:24px;transform:translateY(-95%);overflow:hidden;pointer-events:none}
#tide-wavesvg{display:block;width:200%;height:100%;animation:drift 9s linear infinite}
@keyframes drift{to{transform:translateX(-50%)}}
#pulse{position:absolute;inset:0;z-index:5;pointer-events:none;opacity:0;transition:none}
#pulse.on{animation:pls .9s ease-out forwards}
@keyframes pls{from{opacity:.4}to{opacity:0}}
/* 상단 */
#top{position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;padding:max(18px,env(safe-area-inset-top)) clamp(16px,3vw,28px) 0}
#mark{display:flex;flex-direction:column;gap:2px}
#mark b{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:13px;letter-spacing:.34em}
#mark span{font-size:11px;color:#8B93A7;letter-spacing:.06em}
#icons{display:flex;gap:8px}
/* 중앙 */
#main{position:relative;z-index:2;flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(8px,1.6vh,18px);padding:0 16px;text-align:center}
#eyebrow{display:flex;align-items:center;gap:10px;font-size:clamp(13px,1.8vw,16px);font-weight:500;color:#C9CDD9;letter-spacing:.04em}
#dot{width:9px;height:9px;border-radius:50%;flex:none}
#phase-label{font-weight:700;color:#F2EFE6;font-size:clamp(20px,3.2vw,30px);letter-spacing:.02em}
#clock{font-family:'Bricolage Grotesque',system-ui,sans-serif;font-weight:800;font-size:clamp(74px,21vw,220px);line-height:.95;letter-spacing:-0.015em;text-shadow:0 2px 34px rgba(8,10,16,.55);font-variant-numeric:tabular-nums;letter-spacing:-.01em}
#next-line{display:flex;align-items:center;gap:10px;font-size:clamp(13px,1.8vw,16px);color:#B7BCC9}
#pause-chip{font-size:12px;font-weight:700;letter-spacing:.12em;padding:4px 10px;border-radius:999px;border:1px solid rgba(242,239,230,.3);color:#F2EFE6;display:none}
/* 하단 */
#bottom{position:relative;z-index:2;padding:0 clamp(16px,4vw,32px) max(22px,calc(env(safe-area-inset-bottom)+8px));display:flex;flex-direction:column;align-items:center;gap:14px}
#strip{width:min(920px,100%);height:10px;display:flex;gap:3px}
#stripmeta{width:min(920px,100%);display:flex;justify-content:space-between;font-size:12px;color:#8B93A7;letter-spacing:.04em}
#controls{display:flex;align-items:center;gap:clamp(14px,4vw,26px);padding-top:2px}
/* 버튼 */
.btn{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;border:1px solid rgba(242,239,230,.16);background:rgba(242,239,230,.07);color:#F2EFE6;cursor:pointer;transition:background .15s,transform .1s;padding:0}
.btn:hover{background:rgba(242,239,230,.14)}.btn:active{transform:scale(.96)}
.btn:focus-visible{outline:2px solid #F2EFE6;outline-offset:3px}
.sm{width:44px;height:44px}.md{width:54px;height:54px}
#btn-play{width:80px;height:80px;border:none;background:#F2EFE6;color:#0B0E14}
#btn-play:hover{background:#FFFDF4}
/* 설정 시트 */
#scrim{position:fixed;inset:0;z-index:40;background:rgba(5,7,11,.62);backdrop-filter:blur(2px);display:none}
#sheet{position:fixed;z-index:50;left:50%;bottom:0;transform:translateX(-50%);width:min(560px,100%);max-height:min(88vh,88dvh);overflow-y:auto;background:#12151E;border:1px solid rgba(242,239,230,.1);border-bottom:none;border-radius:22px 22px 0 0;padding:20px 22px calc(24px + env(safe-area-inset-bottom));display:none}
@media(min-width:640px){#sheet{bottom:auto;top:50%;transform:translate(-50%,-50%);border-radius:22px;border-bottom:1px solid rgba(242,239,230,.1)}}
#sheet h2{margin:0 0 4px;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:space-between}
.hint{margin:0 0 14px;font-size:12.5px;color:#8B93A7}
.row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-top:1px solid rgba(242,239,230,.08);gap:12px}
.lbl{font-size:15px;font-weight:500}.sub{display:block;font-size:12px;color:#8B93A7;margin-top:2px;font-weight:400}
.step{display:flex;align-items:center;gap:8px}
.val{min-width:86px;text-align:center;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:22px;font-variant-numeric:tabular-nums}
.val small{font-family:'IBM Plex Sans KR',sans-serif;font-size:12px;font-weight:500;color:#8B93A7;margin-left:3px}
.sw{position:relative;width:50px;height:30px;border-radius:999px;border:none;cursor:pointer;transition:background .18s;flex:none}
.sw .knob{position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#F2EFE6;transition:transform .18s}
.sw.on .knob{transform:translateX(20px)}
.sw:focus-visible{outline:2px solid #F2EFE6;outline-offset:3px}
.foot{display:flex;justify-content:space-between;gap:10px;margin-top:16px}
.tbtn{border:1px solid rgba(242,239,230,.18);background:transparent;color:#C9CDD9;border-radius:12px;padding:11px 16px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer}
.tbtn.pri{background:#F2EFE6;color:#0B0E14;border-color:#F2EFE6;font-weight:700}
.tbtn:focus-visible{outline:2px solid #F2EFE6;outline-offset:3px}
@media(max-width:460px){#stripmeta span:first-child{display:none}#stripmeta{justify-content:flex-end}}
@media(prefers-reduced-motion:reduce){#tide-wavesvg{animation:none}#tide{transition:height .2s linear}}
</style>
</head>
<body>

<div id="tide" aria-hidden="true">
  <div id="tide-wavewrap">
    <svg id="tide-wavesvg" viewBox="0 0 2400 32" preserveAspectRatio="none">
      <path id="wavepath" fill="#4E6EF2"/>
    </svg>
  </div>
  <div id="tide-surface"></div>
</div>
<div id="pulse" aria-hidden="true"></div>

<header id="top">
  <div id="mark">
    <b>STUDY&nbsp;TIDE</b>
    <span>20·5·15 집중 사이클</span>
  </div>
  <div id="icons">
    <button class="btn sm" id="btn-sound" aria-label="종료음 끄기">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="icon-sound"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14" id="sound-far"/></svg>
    </button>
    <button class="btn sm" id="btn-settings" aria-label="시간 설정">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>
</header>

<main id="main">
  <div id="eyebrow">
    <span id="dot"></span>
    <span id="phase-label">집중</span>
    <span style="opacity:.4">·</span>
    <span id="session-label">세션 1 / 3</span>
  </div>
  <div id="clock" role="timer" aria-label="남은 시간">20:00</div>
  <div id="next-line">
    <span id="pause-chip">일시정지</span>
    <span id="next-text">다음 · 복기 5분</span>
  </div>
</main>

<footer id="bottom">
  <div id="strip" role="img" aria-label="전체 사이클 진행"></div>
  <div id="stripmeta">
    <span id="meta-left">집중 20분 + 복기 5분 × 3 → 휴식 15분</span>
    <span id="meta-right">0 / 90분</span>
  </div>
  <div id="controls">
    <button class="btn md" id="btn-reset" aria-label="처음으로">
      <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.73"/></svg>
    </button>
    <button class="btn" id="btn-play" aria-label="시작">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor" stroke="none" id="icon-play"><polygon points="5 3 19 12 5 21 5 3" style="margin-left:3px"/></svg>
    </button>
    <button class="btn md" id="btn-skip" aria-label="다음 단계">
      <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
    </button>
  </div>
</footer>

<!-- 설정 시트 -->
<div id="scrim"></div>
<div id="sheet" role="dialog" aria-modal="true" aria-label="시간 설정">
  <h2>시간 설정
    <button class="btn sm" id="btn-close" aria-label="닫기">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </h2>
  <p class="hint" id="sheet-hint">변경 즉시 적용돼요.</p>
  <div class="row" style="border-top:none">
    <span class="lbl">집중<span class="sub">한 세션의 공부 시간</span></span>
    <div class="step"><button class="btn sm step-btn" data-key="focus" data-d="-1">−</button><span class="val" id="val-focus">20<small>분</small></span><button class="btn sm step-btn" data-key="focus" data-d="1">+</button></div>
  </div>
  <div class="row">
    <span class="lbl">복기<span class="sub">집중 직후 정리 시간</span></span>
    <div class="step"><button class="btn sm step-btn" data-key="review" data-d="-1">−</button><span class="val" id="val-review">5<small>분</small></span><button class="btn sm step-btn" data-key="review" data-d="1">+</button></div>
  </div>
  <div class="row">
    <span class="lbl">휴식<span class="sub">사이클 끝의 긴 휴식</span></span>
    <div class="step"><button class="btn sm step-btn" data-key="brk" data-d="-1">−</button><span class="val" id="val-brk">15<small>분</small></span><button class="btn sm step-btn" data-key="brk" data-d="1">+</button></div>
  </div>
  <div class="row">
    <span class="lbl">세션 수<span class="sub">휴식 전 반복 횟수</span></span>
    <div class="step"><button class="btn sm step-btn" data-key="sessions" data-d="-1">−</button><span class="val" id="val-sessions">3<small>회</small></span><button class="btn sm step-btn" data-key="sessions" data-d="1">+</button></div>
  </div>
  <div class="row">
    <span class="lbl">자동 진행<span class="sub">단계가 끝나면 바로 다음 시작</span></span>
    <button class="sw" id="sw-auto" role="switch" aria-checked="true" aria-label="자동 진행"><span class="knob"></span></button>
  </div>
  <div class="row">
    <span class="lbl">종료음<span class="sub">단계가 바뀔 때 알림음</span></span>
    <button class="sw on" id="sw-sound" role="switch" aria-checked="true" aria-label="종료음"><span class="knob"></span></button>
  </div>
  <div class="foot">
    <button class="tbtn" id="btn-default">기본값 (20·5·15)</button>
    <button class="tbtn pri" id="btn-done">완료</button>
  </div>
</div>

<script>
// ── 상수 ──
const PHASES = {
  focus:  { label:"집중", top:"#4E6EF2", deep:"#1B2B85", glow:"rgba(78,110,242,0.45)" },
  review: { label:"복기", top:"#DE8E2C", deep:"#7C400E", glow:"rgba(222,142,44,0.42)" },
  brk:    { label:"휴식", top:"#2CA87E", deep:"#0C513B", glow:"rgba(44,168,126,0.42)" },
};
const LIMITS = { focus:[1,120], review:[1,60], brk:[1,60], sessions:[1,8] };
const DEFAULTS = { focus:20, review:5, brk:15, sessions:3, autoNext:true, sound:true };

// ── 물결 path ──
const WAVE_D = (() => {
  let d = "M0 16 Q 50 5 100 16";
  for (let x=200;x<=2400;x+=100) d+=` T ${x} 16`;
  return d+" L2400 32 L0 32 Z";
})();
document.getElementById("wavepath").setAttribute("d", WAVE_D);

// ── 상태 ──
let S = {...DEFAULTS};
try { const ls=localStorage.getItem("tide2"); if(ls) S={...S,...JSON.parse(ls)}; } catch(e){}
let phase="focus", sessionNo=1, status="idle";
let totalMs=S.focus*60000, remainMs=S.focus*60000;
let endTs=0, tickId=null;

// ── 오디오 ──
let ac=null;
function initAudio(){ try{ if(!ac) ac=new(window.AudioContext||window.webkitAudioContext)(); if(ac.state==="suspended") ac.resume(); }catch(e){} }
function tone(f,t0,dur,vol=0.1){
  if(!ac) return;
  try{
    const o=ac.createOscillator(),g=ac.createGain();
    o.type="sine"; o.frequency.value=f; o.connect(g); g.connect(ac.destination);
    const t=ac.currentTime+t0;
    g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(vol,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.start(t); o.stop(t+dur+0.05);
  }catch(e){}
}
function chime(next){
  if(!S.sound) return; initAudio();
  if(next==="brk"){tone(523,0,0.5);tone(392,0.18,0.7);}
  else if(next==="review"){tone(660,0,0.35);tone(880,0.16,0.5);}
  else{tone(587,0,0.3);tone(740,0.14,0.45);}
}

// ── Wake Lock ──
let wl=null;
async function acquireWL(){ try{ if(navigator.wakeLock) wl=await navigator.wakeLock.request("screen"); }catch(e){} }
function releaseWL(){ try{wl?.release();}catch(e){} wl=null; }
document.addEventListener("visibilitychange",()=>{ if(document.visibilityState==="visible"&&status==="running") acquireWL(); });

// ── 헬퍼 ──
function fmt(ms){ const t=Math.max(0,Math.round(ms/1000)); return String(Math.floor(t/60)).padStart(2,"0")+":"+String(t%60).padStart(2,"0"); }
function hexA(hex,a){ const n=parseInt(hex.slice(1),16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; }
function saveLS(){ try{localStorage.setItem("tide2",JSON.stringify(S));}catch(e){} }

// ── 렌더 ──
function render(){
  const P=PHASES[phase];
  // 물
  const pct=Math.min(1,Math.max(0,1-remainMs/totalMs));
  const tide=document.getElementById("tide");
  tide.style.height=pct*100+"%";
  tide.style.background=`linear-gradient(to top,${P.deep},${P.top})`;
  tide.style.boxShadow=`0 -18px 70px ${P.glow}`;
  document.getElementById("wavepath").setAttribute("fill",P.top);
  // 점·페이즈
  const dot=document.getElementById("dot");
  dot.style.background=P.top; dot.style.boxShadow=`0 0 10px ${P.glow}`;
  document.getElementById("phase-label").textContent=P.label;
  document.getElementById("session-label").textContent=phase==="brk"?"긴 휴식":`세션 ${sessionNo} / ${S.sessions}`;
  // 시계
  document.getElementById("clock").textContent=fmt(remainMs);
  document.getElementById("clock").setAttribute("aria-label",`${P.label} 남은 시간 ${fmt(remainMs)}`);
  // 다음
  let nextTxt;
  if(phase==="focus") nextTxt=`복기 ${S.review}분`;
  else if(phase==="review") nextTxt=sessionNo>=S.sessions?`휴식 ${S.brk}분`:`${sessionNo+1}번째 집중 ${S.focus}분`;
  else nextTxt=`새 사이클 · 집중 ${S.focus}분`;
  document.getElementById("next-text").textContent="다음 · "+nextTxt;
  document.getElementById("pause-chip").style.display=status==="paused"?"inline-flex":"none";
  // 플레이 버튼
  const iconPlay=document.getElementById("icon-play");
  if(status==="running"){
    iconPlay.innerHTML='<rect x="6" y="4" width="4" height="16" fill="currentColor"/><rect x="14" y="4" width="4" height="16" fill="currentColor"/>';
    document.getElementById("btn-play").setAttribute("aria-label","일시정지");
  } else {
    iconPlay.innerHTML='<polygon points="5 3 19 12 5 21 5 3" style="margin-left:3px"/>';
    document.getElementById("btn-play").setAttribute("aria-label","시작");
  }
  document.getElementById("btn-play").style.boxShadow=`0 8px 36px ${P.glow}`;
  // 스트립
  renderStrip();
  // 메타
  const cycleMin=S.sessions*(S.focus+S.review)+S.brk;
  let segs=[];
  for(let i=0;i<S.sessions;i++){segs.push({t:"focus",d:S.focus});segs.push({t:"review",d:S.review});}
  segs.push({t:"brk",d:S.brk});
  const curSeg=phase==="brk"?segs.length-1:(sessionNo-1)*2+(phase==="review"?1:0);
  let elapsed=0; for(let i=0;i<curSeg;i++) elapsed+=segs[i].d;
  elapsed+=(totalMs-remainMs)/60000;
  document.getElementById("meta-left").textContent=`집중 ${S.focus}분 + 복기 ${S.review}분 × ${S.sessions} → 휴식 ${S.brk}분`;
  document.getElementById("meta-right").textContent=`${Math.floor(elapsed)} / ${cycleMin}분`;
  // 설정 값
  ["focus","review","brk","sessions"].forEach(k=>{
    const el=document.getElementById("val-"+k);
    const unit=k==="sessions"?"회":"분";
    el.innerHTML=S[k]+`<small>${unit}</small>`;
  });
  document.getElementById("sw-auto").className="sw"+(S.autoNext?" on":"");
  document.getElementById("sw-auto").setAttribute("aria-checked",S.autoNext);
  document.getElementById("sw-sound").className="sw"+(S.sound?" on":"");
  document.getElementById("sw-sound").setAttribute("aria-checked",S.sound);
  // 사운드 아이콘
  const si=document.getElementById("icon-sound");
  const farPath=document.getElementById("sound-far");
  if(S.sound){ si.style.opacity="1"; if(farPath) farPath.style.display=""; }
  else { si.style.opacity=".45"; if(farPath) farPath.style.display="none"; }
  // 힌트
  document.getElementById("sheet-hint").textContent=(status==="running"||remainMs!==totalMs)?"변경한 시간은 다음 단계부터 적용돼요.":"변경 즉시 적용돼요.";
}

function renderStrip(){
  const strip=document.getElementById("strip");
  strip.innerHTML="";
  let segs=[];
  for(let i=0;i<S.sessions;i++){segs.push({t:"focus",d:S.focus});segs.push({t:"review",d:S.review});}
  segs.push({t:"brk",d:S.brk});
  const curSeg=phase==="brk"?segs.length-1:(sessionNo-1)*2+(phase==="review"?1:0);
  const pct=Math.min(1,Math.max(0,1-remainMs/totalMs));
  segs.forEach((sg,i)=>{
    const P2=PHASES[sg.t];
    const div=document.createElement("div");
    div.style.cssText=`position:relative;height:100%;border-radius:6px;overflow:hidden;min-width:4px;flex-grow:${sg.d};flex-basis:0;background:${hexA(P2.top,0.16)}`;
    const fill=document.createElement("div");
    const w=i<curSeg?100:i===curSeg?pct*100:0;
    fill.style.cssText=`position:absolute;inset:0 auto 0 0;width:${w}%;background:${P2.top};transition:width .3s linear`;
    div.appendChild(fill); strip.appendChild(div);
  });
}

// ── 단계 전환 ──
function advance(withSound, autostart){
  let np, ns;
  if(phase==="focus"){np="review";ns=sessionNo;}
  else if(phase==="review"){
    if(sessionNo>=S.sessions){np="brk";ns=sessionNo;}
    else{np="focus";ns=sessionNo+1;}
  } else {np="focus";ns=1;}
  phase=np; sessionNo=ns;
  totalMs=remainMs=(np==="focus"?S.focus:np==="review"?S.review:S.brk)*60000;
  if(withSound) chime(np);
  // 펄스
  const pulse=document.getElementById("pulse");
  pulse.style.background=PHASES[np].glow;
  pulse.className=""; void pulse.offsetWidth; pulse.className="on";
  if(autostart){ status="running"; endTs=Date.now()+totalMs; startTick(); }
  else { status="idle"; stopTick(); }
  render();
}

// ── 틱 ──
function startTick(){
  stopTick();
  tickId=setInterval(()=>{
    const r=endTs-Date.now();
    if(r<=0){ advance(true,S.autoNext); }
    else{ remainMs=r; render(); }
  },250);
}
function stopTick(){ if(tickId){clearInterval(tickId);tickId=null;} }

// ── 이벤트 ──
document.getElementById("btn-play").addEventListener("click",()=>{
  if(status==="running"){ remainMs=Math.max(0,endTs-Date.now()); status="paused"; stopTick(); releaseWL(); }
  else{ initAudio(); status="running"; endTs=Date.now()+remainMs; startTick(); acquireWL(); }
  render();
});
document.getElementById("btn-reset").addEventListener("click",()=>{
  stopTick(); releaseWL(); status="idle"; phase="focus"; sessionNo=1;
  totalMs=remainMs=S.focus*60000; render();
});
document.getElementById("btn-skip").addEventListener("click",()=>{
  advance(false, status==="running");
});
document.getElementById("btn-settings").addEventListener("click",()=>{
  document.getElementById("scrim").style.display="block";
  document.getElementById("sheet").style.display="block";
  render();
});
function closeSheet(){
  document.getElementById("scrim").style.display="none";
  document.getElementById("sheet").style.display="none";
}
document.getElementById("btn-close").addEventListener("click",closeSheet);
document.getElementById("btn-done").addEventListener("click",closeSheet);
document.getElementById("scrim").addEventListener("click",closeSheet);
document.getElementById("btn-default").addEventListener("click",()=>{
  S={...DEFAULTS}; saveLS();
  if(status==="idle"&&remainMs===totalMs){ totalMs=remainMs=S.focus*60000; }
  render();
});
// 스텝 버튼
document.querySelectorAll(".step-btn").forEach(btn=>{
  let hold=null,iv=null;
  const apply=()=>{
    const k=btn.dataset.key, d=parseInt(btn.dataset.d);
    const [mn,mx]=LIMITS[k];
    S[k]=Math.min(mx,Math.max(mn,S[k]+d));
    if(status==="idle"&&remainMs===totalMs&&k!=="sessions"){
      if(k===phase.replace("brk","brk")||(phase==="focus"&&k==="focus")||(phase==="review"&&k==="review")||(phase==="brk"&&k==="brk")){
        totalMs=remainMs=S[k]*60000;
      }
    }
    saveLS(); render();
  };
  btn.addEventListener("pointerdown",()=>{ apply(); hold=setTimeout(()=>{ iv=setInterval(apply,70); },380); });
  const stop=()=>{ clearTimeout(hold); clearInterval(iv); };
  btn.addEventListener("pointerup",stop); btn.addEventListener("pointerleave",stop); btn.addEventListener("pointercancel",stop);
});
// 스위치
document.getElementById("sw-auto").addEventListener("click",()=>{ S.autoNext=!S.autoNext; saveLS(); render(); });
document.getElementById("sw-sound").addEventListener("click",()=>{ S.sound=!S.sound; saveLS(); render(); });
document.getElementById("btn-sound").addEventListener("click",()=>{ S.sound=!S.sound; saveLS(); render(); });
// Space
document.addEventListener("keydown",e=>{
  if(e.code!=="Space"||document.getElementById("sheet").style.display==="block") return;
  if(e.target&&(e.target.tagName==="BUTTON")) return;
  e.preventDefault();
  document.getElementById("btn-play").click();
});

// ── 첫 렌더 ──
render();

// ── 서비스 워커 ──
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); });
}
</script>
</body>
</html>
